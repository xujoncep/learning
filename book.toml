[book]
title = "Learning Handbooks"
authors = ["Md. Sahabuddin Hossain"]
description = "সম্পূর্ণ বাংলায় Software Engineering Learning Guides — BCS, Bank, IT Job Exam"
language = "bn"
src = "src"

[build]
build-dir = "docs"

[output.html]
default-theme = "light"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/sujoncep/learning"
edit-url-template = "https://github.com/sujoncep/learning/edit/main/{path}"
no-section-label = false
additional-css = ["theme/custom.css"]

[output.html.search]
enable = true
limit-results = 30
use-hierarchical-headings = true

[output.html.fold]
enable = true
level = 0
