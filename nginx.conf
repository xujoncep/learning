server {
    listen 80;
    server_name localhost;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # Since it's a React SPA, forward all paths to index.html
        try_files $uri $uri/ /index.html;
    }

    # Caching for static assets
    location ~* \.(?:ico|css|js|gif|png|jpe?g|svg|woff2?|eot|ttf|otf)$ {
        root /usr/share/nginx/html;
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }

    # Error matching
    error_page 404 /index.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}