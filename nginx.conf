server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ──────────────────────────────────────────────
    # Compression
    # ──────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/xml
        application/rss+xml
        application/atom+xml
        application/wasm
        font/ttf
        font/otf
        font/woff
        font/woff2
        image/svg+xml;

    # ──────────────────────────────────────────────
    # Fingerprinted assets — immutable, long cache
    # NOTE: add_header is NOT inherited; re-apply security
    # via include in every location that uses add_header.
    # ──────────────────────────────────────────────
    location /assets/ {
        include /etc/nginx/conf.d/security-headers.conf;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        expires 1y;
        access_log off;
        try_files $uri =404;
    }

    # Fonts
    location ~* \.(?:woff2?|otf|ttf|eot)$ {
        include /etc/nginx/conf.d/security-headers.conf;
        add_header Cache-Control "public, max-age=15552000" always;
        expires 6M;
        access_log off;
        try_files $uri =404;
    }

    # Images / svg / ico
    location ~* \.(?:png|jpg|jpeg|gif|webp|svg|ico)$ {
        include /etc/nginx/conf.d/security-headers.conf;
        add_header Cache-Control "public, max-age=2592000" always;
        expires 30d;
        access_log off;
        try_files $uri =404;
    }

    # Service worker — no cache
    location = /sw.js {
        include /etc/nginx/conf.d/security-headers.conf;
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
        expires off;
    }

    location = /registerSW.js {
        include /etc/nginx/conf.d/security-headers.conf;
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
        expires off;
    }

    location = /manifest.webmanifest {
        include /etc/nginx/conf.d/security-headers.conf;
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
        default_type application/manifest+json;
    }

    location = /sitemap.xml {
        include /etc/nginx/conf.d/security-headers.conf;
        add_header Cache-Control "public, max-age=3600" always;
        default_type application/xml;
    }

    location = /robots.txt {
        include /etc/nginx/conf.d/security-headers.conf;
        add_header Cache-Control "public, max-age=86400" always;
    }

    location = /index.html {
        include /etc/nginx/conf.d/security-headers.conf;
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
        expires off;
    }

    # SPA fallback
    location / {
        include /etc/nginx/conf.d/security-headers.conf;
        try_files $uri $uri/ /index.html;
    }

    # Errors
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        internal;
    }
}
